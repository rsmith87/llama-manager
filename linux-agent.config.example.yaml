mode: agent

# Linux agent runtime paths. Adjust these if your Linux checkout/model paths differ.
llama_server_bin: /home/{user_name}/Apps/llama.cpp/build/bin/llama-server
llama_cpp_dir: /home/{user_name}/Apps/llama.cpp
python_bin: /home/{user_name}/Apps/llama.cpp/.venv/bin/python
hf_models_dirs:
  - /home/{user_name}/models/HFModels
log_dir: logs

# Requests from the Mac controller to this Linux agent must send this value as
# X-Llama-Manager-Key. Keep the real key outside the repo.
agent_api_key: ${LLAMA_MANAGER_AGENT_API_KEY}

# Agent heartbeat/registration back to the controller.
controller_url: ${LLAMA_MANAGER_CONTROLLER_URL}
node_name: linux-2080ti
agent_url: ${LLAMA_MANAGER_AGENT_URL}
heartbeat_interval_seconds: 30
controller_registration_key_outbound: ${LLAMA_MANAGER_CONTROLLER_REGISTRATION_KEY_OUTBOUND}

# Enable only if this Linux box should claim controller jobs.
agent_worker_enabled: false
agent_worker_poll_interval_seconds: 2
agent_worker_max_jobs: 1
agent_worker_labels:
  gpu: 2080ti
  os: linux
agent_worker_capacity:
  gpu_count: 1

models: {}

